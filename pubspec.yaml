name: mood_sensor_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^4.0.2
  geolocator: ^10.1.0
  battery_plus: ^5.0.3
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.0
  camera: ^0.10.5+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/app_icons/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icons/logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
  - assets/app_icons/
